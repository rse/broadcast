run:
    dir: ./run
    uid: inherit
    gid: inherit

#   load-balancer (Linux NFTables or HAProxy)
router:
    type:    haproxy
    service: { addr: 0.0.0.0, port: 443 }

#   reverse proxy (HAProxy)
proxy:
    instances:  2
    frontend:   { addr: 127.0.0.1, port: 10000 }
    tls:
        type:  self-signed
        email: none
        addr:  127.0.0.1
        fqdn:
            - localhost
    backend:
        - { host-match: "^(localhost|127\\.0\\.0\\.1):.*$", path-match: "^/pr/api/client/$", path-subst: "",    forward: "broker:pr:frontend"  }
        # - { host-match: "^(localhost|127\\.0\\.0\\.1):.*$", path-match: "^/qa/api/client/$", path-subst: "",    forward: "broker:qa:frontend"  }
        # - { host-match: "^(localhost|127\\.0\\.0\\.1):.*$", path-match: "^/dv/api/client/$", path-subst: "",    forward: "broker:dv:frontend"  }
        - { host-match: "^(localhost|127\\.0\\.0\\.1):.*$", path-match: "^/pr/api/server/$", path-subst: "",    forward: "broker:pr:backend"  }
        # - { host-match: "^(localhost|127\\.0\\.0\\.1):.*$", path-match: "^/qa/api/server/$", path-subst: "",    forward: "broker:qa:backend"  }
        # - { host-match: "^(localhost|127\\.0\\.0\\.1):.*$", path-match: "^/dv/api/server/$", path-subst: "",    forward: "broker:dv:backend"  }
        - { host-match: "^(localhost|127\\.0\\.0\\.1):.*$", path-match: "^/pr/(.*)",         path-subst: "/$1", forward: "gateway:pr" }
        # - { host-match: "^(localhost|127\\.0\\.0\\.1):.*$", path-match: "^/qa/(.*)",         path-subst: "/$1", forward: "gateway:qa" }
        # - { host-match: "^(localhost|127\\.0\\.0\\.1):.*$", path-match: "^/dv/(.*)",         path-subst: "/$1", forward: "gateway:dv" }

#   gateway (Junction frontend)
gateway:
    pr: { instances: 1, addr: 127.0.0.1, port: 10100 }
    # qa: { instances: 1, addr: 127.0.0.1, port: 10140 }
    # dv: { instances: 1, addr: 127.0.0.1, port: 10180 }

#   broker (Mosquitto)
broker:
    pr:
        instances: { frontend: 2, backend: 1 }
        frontend:  { addr: 127.0.0.1, port: 10200 }
        bridge:    { addr: 127.0.0.1, port: 10240, user: bridge,  pass: "" }
        backend:   { addr: 127.0.0.1, port: 10280, user: service, pass: "" }
    # qa:
    #     instances: { frontend: 2, backend: 1 }
    #     frontend:  { addr: 127.0.0.1, port: 10300 }
    #     bridge:    { addr: 127.0.0.1, port: 10340, user: bridge,  pass: "" }
    #     backend:   { addr: 127.0.0.1, port: 10380, user: service, pass: "" }
    # dv:
    #     instances: { frontend: 2, backend: 1 }
    #     frontend:  { addr: 127.0.0.1, port: 10400 }
    #     bridge:    { addr: 127.0.0.1, port: 10440, user: bridge,  pass: "" }
    #     backend:   { addr: 127.0.0.1, port: 10480, user: service, pass: "" }

