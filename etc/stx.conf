#   [broadcast] (internal) apply patch set for NPM dependencies
patch-apply
    npm --prefix src/common start patch-apply && \
    npm --prefix src/client start patch-apply && \
    npm --prefix src/server start patch-apply

#   [top-level] automatically update all NPM dependencies
upd
    npx -y upd && \
    (cd src/common && npx -y upd) && \
    (cd src/client && npx -y upd) && \
    (cd src/server && npx -y upd)

#   [broadcast] static code analysis (linting) of all components
lint
    npm --prefix src/common start lint && \
    npm --prefix src/client start lint && \
    npm --prefix src/server start lint

#   [broadcast] build all components for production
build : lint
    npm --prefix src/common start build && \
    npm --prefix src/client start build && \
    npm --prefix src/server start build

#   [broadcast] run all components in development mode (continuous file watching)
dev
    concurrently -k -n common,client,server -c blue,green,magenta \
        "npm --prefix src/common && npm start dev" \
        "npm --prefix src/client && npm start dev" \
        "npm --prefix src/server && npm start dev"

#   [broadcast] run the client component (production preview)
client
    cd src/client && npm start preview

#   [broadcast] run the broker component
broker
    docker run \
        --rm \
        -v `pwd`:/pwd \
        --name junction \
        -p 127.0.0.1:8443:443 \
        ghcr.io/rse/junction:0.9.9-20260713 \
            -L info \
            -d /pwd/tmp \
            -p \
            -e /pwd/.env \
            -c /pwd/etc/junction-local.yaml

#   [broadcast] run the server component
server
    password=$(npx dotenvx get JUNCTION_BROKER_PR_BACKEND_PASS)
    export BROADCAST_MQTT_URL="wss://service:$password@127.0.0.1:8443/pr/api/server/"
    cd src/server
    node dst/app.js --config ../../etc/broadcast-server.yaml

#   [broadcast] run the database component
database
    docker compose -f etc/postgresql.composefile up -d

#   [broadcast] Drizzle actions
server-db-generate
    cd src/server && npm start db-generate
server-db-push
    cd src/server && npm start db-push
server-db-migrate
    cd src/server && npm start db-migrate

#   [broadcast] remove all development-only NPM dependencies
prune
    npm prune --omit=dev

#   [broadcast] remove all generated artifacts (reverse of "npm start build")
clean
    npm --prefix src/common start clean && \
    npm --prefix src/client start clean && \
    npm --prefix src/server start clean

#   [broadcast] remove all generated artifacts (reverse of "npm install" and "npm start build")
distclean
    shx rm -f package-lock.json
    shx rm -rf node_modules
    npm --prefix src/common start distclean && \
    npm --prefix src/client start distclean && \
    npm --prefix src/server start distclean

