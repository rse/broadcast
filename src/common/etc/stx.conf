#   [broadcast-common] patch packages
patch-apply
    exit 0

#   [broadcast-common] static code analysis (linting)
lint
    oxlint --config etc/oxlint.jsonc src && \
    eslint --config etc/eslint.mjs src

#   [broadcast-common] static code analysis (linting) with file watching
lint-watch
    nodemon --exec "npm start lint" --watch src --ext ts

#   [broadcast-common] code compilation/transpiling (building)
build
    tsc --project etc/tsc.json

#   [broadcast-common] code compilation/transpiling (building) with file watching
build-watch
    nodemon --exec "npm start build" --watch src --ext ts

#   [broadcast-common] remove regularly built files
clean
    shx rm -rf dst

#   [broadcast-common] remove all built files
distclean : clean
    shx rm -rf node_modules
